<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
    <title>Paramètres</title>
    <link rel="stylesheet" href="settings.css">
</head>

<body>
    <main class="settings-container" role="dialog" aria-label="Paramètres Project Folder Launcher">
        <div class="title-bar">
            <h1>⚙ Paramètres</h1>
            <button class="title-bar-btn" id="closeBtn" type="button" title="Fermer" aria-label="Fermer">✕</button>
        </div>

        <div class="settings-content">
            <section class="settings-section" aria-labelledby="rootTitle">
                <h2 id="rootTitle">Dossier racine</h2>
                <div class="path-picker">
                    <input type="text" class="input-field" id="racineInput" readonly
                        placeholder="Cliquez Parcourir pour choisir..." aria-label="Dossier racine">
                    <button class="btn btn-secondary" id="browseRacine" type="button">Parcourir...</button>
                </div>
            </section>

            <section class="settings-section" aria-labelledby="subfolderTitle">
                <h2 id="subfolderTitle">Sous-dossiers</h2>
                <div class="subfolder-list" id="subfolderList" aria-label="Liste des sous-dossiers"></div>
                <button class="btn btn-secondary" id="addSubfolder" type="button">+ Ajouter un sous-dossier</button>
            </section>

            <section class="settings-section" aria-labelledby="shortcutTitle">
                <h2 id="shortcutTitle">Raccourci global</h2>
                <div class="shortcut-capture">
                    <input type="text" class="input-field" id="shortcutInput" readonly
                        placeholder="Cliquez puis appuyez sur les touches..." aria-label="Raccourci global">
                    <span class="shortcut-display" id="shortcutCurrent"></span>
                </div>
            </section>

            <section class="settings-section" aria-labelledby="openBehaviorTitle">
                <h2 id="openBehaviorTitle">Comportement d'ouverture</h2>
                <div class="radio-group" role="radiogroup" aria-label="Comportement d'ouverture">
                    <label class="radio-label">
                        <input type="radio" name="openBehavior" value="newWindow" id="openNewWindow">
                        <span class="radio-copy">
                            <span class="radio-title" id="newWindowTitle">Nouvelle fenêtre Explorer</span>
                            <span class="radio-help">Comportement historique avec une nouvelle fenêtre.</span>
                        </span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="openBehavior" value="newTab" id="openNewTab">
                        <span class="radio-copy">
                            <span class="radio-title" id="newTabTitle">Nouvel onglet dans la fenêtre active</span>
                            <span class="radio-help" id="newTabHelp">Ouvre un nouvel onglet Explorer ou Finder si possible.</span>
                        </span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="openBehavior" value="reuseWindow" id="openReuseWindow">
                        <span class="radio-copy">
                            <span class="radio-title" id="reuseWindowTitle">Réutiliser la fenêtre active</span>
                            <span class="radio-help" id="reuseWindowHelp">Remplace le dossier courant dans la fenêtre existante.</span>
                        </span>
                    </label>
                </div>
            </section>

            <section class="settings-section" aria-labelledby="optionsTitle">
                <h2 id="optionsTitle">Options</h2>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="miniBarCheck">
                        <span>Afficher la mini-barre</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="autoStartCheck">
                        <span id="autoStartLabel">Démarrer avec Windows</span>
                    </label>
                </div>
            </section>
        </div>

        <div class="settings-actions">
            <button class="btn btn-secondary" id="cancelBtn" type="button">Annuler</button>
            <button class="btn btn-primary" id="saveBtn" type="button">Enregistrer</button>
        </div>
    </main>

    <script src="settings-renderer.js"></script>
</body>

</html>
