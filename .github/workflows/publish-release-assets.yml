name: Publish release assets

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build. Use main to attach assets to the package.json version release."
        required: true
        default: "main"
      platform:
        description: "Platform assets to publish"
        required: true
        type: choice
        default: "macos"
        options:
          - windows
          - macos
          - all
      macos_signing:
        description: "macOS signing mode. Use unsigned only for temporary test releases."
        required: true
        type: choice
        default: "unsigned"
        options:
          - unsigned
          - signed

permissions:
  contents: write

jobs:
  windows:
    name: Windows NSIS assets
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish Windows release assets
        run: npm run release:win
        env:
          GH_TOKEN: ${{ github.token }}

  macos:
    name: macOS DMG assets
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate macOS signing secrets
        if: ${{ inputs.macos_signing == 'signed' }}
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          [ -z "$CSC_LINK" ] && missing+=("CSC_LINK")
          [ -z "$CSC_KEY_PASSWORD" ] && missing+=("CSC_KEY_PASSWORD")
          [ -z "$APPLE_ID" ] && missing+=("APPLE_ID")
          [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [ -z "$APPLE_TEAM_ID" ] && missing+=("APPLE_TEAM_ID")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required macOS signing/notarization secrets: ${missing[*]}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Publish temporary unsigned macOS DMG assets
        if: ${{ inputs.macos_signing == 'unsigned' }}
        run: npm run release:mac
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Publish signed macOS DMG assets
        if: ${{ inputs.macos_signing == 'signed' }}
        run: npm run release:mac
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Attach macOS DMG assets to the existing release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const tag = `v${packageJson.version}`;
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });

            const distDir = path.join(process.cwd(), 'dist');
            const assets = fs.readdirSync(distDir)
              .filter((fileName) => /^ProjectFolderLauncher-.+-mac\.dmg$/.test(fileName))
              .sort();

            if (assets.length === 0) {
              core.setFailed('No macOS DMG assets were generated in dist/.');
              return;
            }

            for (const fileName of assets) {
              const existingAsset = release.data.assets.find((asset) => asset.name === fileName);
              if (existingAsset) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: existingAsset.id
                });
              }

              const filePath = path.join(distDir, fileName);
              const data = fs.readFileSync(filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: fileName,
                data,
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': data.length
                }
              });
              core.info(`Uploaded ${fileName}`);
            }
